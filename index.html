<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inscripción a Talleres</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main class="contenedor-principal">
        <section class="tarjeta-formulario">
            <header class="encabezado">
                <span class="etiqueta">Proyecto web</span>
                <h1>Inscripción a talleres comunitarios</h1>
                <p>Completa el formulario. El sistema validará tus datos antes de confirmar la inscripción.</p>
            </header>

            <form id="formularioInscripcion" novalidate>
                <div class="grupo-campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ejemplo: Laura Gómez">
                    <small id="errorNombre" class="mensaje-error"></small>
                </div>

                <div class="grupo-campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="Ejemplo: usuario@correo.com">
                    <small id="errorCorreo" class="mensaje-error"></small>
                </div>

                <div class="fila-doble">
                    <div class="grupo-campo">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" placeholder="Ejemplo: 15">
                        <small id="errorEdad" class="mensaje-error"></small>
                    </div>

                    <div class="grupo-campo">
                        <label for="contacto">Número de contacto</label>
                        <input type="text" id="contacto" placeholder="10 dígitos">
                        <small id="errorContacto" class="mensaje-error"></small>
                    </div>
                </div>

                <div class="grupo-campo">
                    <label for="taller">Taller de interés</label>
                    <select id="taller">
                        <option value="">Selecciona un taller</option>
                        <option value="Programación web básica">Programación web básica</option>
                        <option value="Excel para emprendimientos">Excel para emprendimientos</option>
                        <option value="Marketing digital comunitario">Marketing digital comunitario</option>
                    </select>
                    <small id="errorTaller" class="mensaje-error"></small>
                </div>

                <div class="grupo-campo">
                    <label for="mensaje">Observación o mensaje</label>
                    <textarea id="mensaje" rows="4" placeholder="Escribe una observación opcional"></textarea>
                    <small id="errorMensaje" class="mensaje-error"></small>
                </div>

                <button type="submit" class="boton-enviar">Enviar inscripción</button>
            </form>

            <div id="mensajeGeneral" class="mensaje-general" aria-live="polite"></div>

            <section id="resumenDatos" class="resumen oculto">
                <h2>Resumen de inscripción</h2>
                <p id="resumenTexto"></p>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
